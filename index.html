<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Duroc | Genética Suína de Alto Padrão</title>
    <style>
        :root {
            --primary: #8b4513;
            --secondary: #d2b48c;
            --accent: #e67e22;
            --dark: #333;
            --light: #f4f4f4;
            --brand-green: #2E7D32; /* verde profesional */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1594771804816-773715d96200?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 20px;
            text-align: center;
            overflow: hidden;
        }

        /* Texto grande en el fondo */
        .bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            font-size: 8rem;
            font-weight: 900;
            color: white;
            opacity: 0.95; /* más visible sobre el fondo verde */
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            letter-spacing: 10px;
            background-color: var(--brand-green);
            padding: 0.2em 0.8em;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        header > * {
            position: relative;
            z-index: 2; /* por encima del texto de fondo */
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-10px); }

        .card img { width: 100%; height: 200px; object-fit: cover; }

        .card-content { padding: 20px; }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        /* Foto destacada debajo de la cabecera (opcional) */
        .hero-photo {
            max-width: 1000px;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }

        .hero-photo img { width: 100%; height: auto; display: block; }

        @media (max-width: 600px) {
            .bg-text { font-size: 3.5rem; letter-spacing: 4px; padding: 0.1em 0.4em; }
            header { padding: 60px 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="bg-text">AGROPECUARIA</div>
    <h1>Elite Duroc</h1>
    <p>A excelência em suínos para o seu plantel</p>
</header>

<!-- Foto destacada de la raza Duroc -->
<div class="hero-photo container">
    <img src="https://images.unsplash.com/photo-1549421263-504543310497?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80" alt="Suíno Duroc">
</div>

<div class="container">
    <h2>Nossos Reprodutores Duroc</h2>
    <div class="products" id="product-list">
        <!-- Cards serão gerados pelo JS -->
    </div>
</div>

<footer>
    <p>&copy; 2026 Elite Duroc - Vendas de Reprodutores</p>
</footer>

<script>
    const pigs = [
        { name: "Duroc Premium A1", desc: "Genética superior, excelente ganho de peso.", price: "R$ 4.500" },
        { name: "Duroc Elite B2", desc: "Robustez e alta conversão alimentar.", price: "R$ 4.200" },
        { name: "Duroc Campeão C3", desc: "Seleção rigorosa para melhor qualidade de carne.", price: "R$ 5.000" }
    ];

    const container = document.getElementById('product-list');

    pigs.forEach(pig => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="https://images.unsplash.com/photo-1549421263-504543310497?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Suíno Duroc">
            <div class="card-content">
                <h3>${pig.name}</h3>
                <p>${pig.desc}</p>
                <p><strong>${pig.price}</strong></p>
                <button onclick="alert('Entrando em contato sobre ${pig.name}!')">Solicitar Orçamento</button>
            </div>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
